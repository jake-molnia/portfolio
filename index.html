<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark light" />
    <meta name="darkreader-lock" />
    <meta name="description" content="Jacob Molnia — Deep Learning and Optimization" />
    <title>Jacob Molnia</title>
    <script>
      (function() {
        var stored = 'system';
        try { stored = localStorage.getItem('theme') || 'system'; } catch(e) {}
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var dark = stored === 'dark' || (stored === 'system' && (prefersDark || !prefersLight));
        document.documentElement.classList.add(dark ? 'dark' : 'light');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dark ? '#0a0a0a' : '#fafafa');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Ubuntu+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Ubuntu+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
